# WI-5: Daily metrics refresh + dashboard deploy
# Runs the NuGet + GitHub Collector to update dashboard data.
# Commits results to data/ if anything changed, then deploys to GitHub Pages.

name: Refresh Metrics

on:
  schedule:
    - cron: "0 9 * * *" # Daily at 04:00 AM EST (09:00 UTC)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-metrics
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build Collector
        run: dotnet build src/Collector/Collector.csproj --configuration Release

      - name: Run Collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_REPO_ROOT: ${{ github.workspace }}
        run: dotnet run --project src/Collector/Collector.csproj --configuration Release

      - name: Check for data changes
        id: changes
        run: |
          git add --force data/latest/*.json data/history/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes detected — will commit."
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh metrics [skip ci]"
          git push

      - name: Regenerate repo-identity profiles
        run: dotnet run --project src/RepoIdentity/RepoIdentity.csproj --framework net10.0 --configuration Release -- generate --source data/latest/data.repositories.json

      - name: Commit updated profiles
        run: |
          git add terminal/ohmyposh/
          if git diff --staged --quiet; then
            echo "No profile changes — skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh Oh My Posh profiles [skip ci]"
            git push
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/data
          cp site/index.html _site/
          cp data/latest/data.nuget.json _site/data/data.nuget.json
          cp data/latest/data.repositories.json _site/data/data.repositories.json
          cp data/latest/data.trends.json _site/data/data.trends.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
