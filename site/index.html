<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NuGet Package Dashboard</title>
  <style>
    :root {
      --bg: #f8f9fc;
      --bg-card: #ffffff;
      --text: #1e1e2e;
      --text-muted: #6c6f85;
      --accent: #6c47ff;
      --accent-light: #8b6fff;
      --accent-bg: #f0ebff;
      --blue: #1a6dff;
      --blue-bg: #e8f0ff;
      --border: #e2e4eb;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(108,71,255,0.12), 0 2px 4px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", Arial, sans-serif;
      --toolbar-bg: #eef0f5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111122;
        --bg-card: #1a1a2e;
        --text: #e0e0f0;
        --text-muted: #8888aa;
        --accent: #9b7dff;
        --accent-light: #b49dff;
        --accent-bg: #2a2245;
        --blue: #5a9dff;
        --blue-bg: #1a2540;
        --border: #2a2a44;
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
        --shadow-hover: 0 4px 12px rgba(155,125,255,0.2), 0 2px 4px rgba(0,0,0,0.2);
        --toolbar-bg: #16162a;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    /* Header */
    header {
      background: linear-gradient(135deg, #4a2dbd 0%, #6c47ff 50%, #1a6dff 100%);
      color: #fff;
      padding: 2.5rem 0 2rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; }
    header .subtitle { font-size: 1rem; opacity: 0.85; margin-top: 0.25rem; }
    header .updated { font-size: 0.85rem; opacity: 0.7; margin-top: 0.5rem; }

    /* Summary cards */
    .summary {
      display: flex; gap: 1rem; justify-content: center;
      flex-wrap: wrap; margin-top: 1.5rem;
    }
    .summary-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius);
      padding: 1rem 2rem;
      text-align: center; min-width: 160px;
    }
    .summary-card .number { font-size: 2rem; font-weight: 800; line-height: 1.2; }
    .summary-card .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.85; }

    /* Sections */
    section { padding: 2rem 0; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
    }
    .section-header h2 {
      font-size: 1.4rem; font-weight: 700;
      display: flex; align-items: center; gap: 0.5rem; margin: 0;
    }
    .section-header h2 .icon { font-size: 1.3rem; }
    .section-meta {
      display: flex; align-items: center; gap: 0.75rem;
    }
    .result-count {
      font-size: 0.82rem; color: var(--text-muted); white-space: nowrap;
    }

    /* View toggle */
    .view-toggle {
      display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden;
    }
    .view-toggle button {
      background: var(--bg-card); border: none; padding: 0.35rem 0.65rem;
      cursor: pointer; font-size: 1rem; color: var(--text-muted);
      line-height: 1; transition: background 0.15s, color 0.15s;
    }
    .view-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
    .view-toggle button.active { background: var(--accent); color: #fff; }
    .view-toggle button:hover:not(.active) { background: var(--toolbar-bg); }

    /* Filter toolbar */
    .filter-toolbar {
      background: var(--toolbar-bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .filter-group {
      display: flex; align-items: center; gap: 0.35rem;
    }
    .filter-group label {
      font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;
    }
    .filter-toolbar input[type="text"] {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.4rem 0.65rem; font-size: 0.85rem;
      color: var(--text); font-family: var(--font); width: 180px;
      outline: none; transition: border-color 0.15s;
    }
    .filter-toolbar input[type="text"]:focus { border-color: var(--accent); }
    .filter-toolbar input[type="text"]::placeholder { color: var(--text-muted); opacity: 0.7; }
    .filter-toolbar select {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.4rem 0.5rem; font-size: 0.85rem;
      color: var(--text); font-family: var(--font); cursor: pointer;
      outline: none;
    }
    .filter-toolbar select:focus { border-color: var(--accent); }

    /* Pill buttons for min-downloads */
    .pill-group { display: flex; gap: 0.25rem; }
    .pill-group button {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 999px; padding: 0.25rem 0.7rem; font-size: 0.78rem;
      color: var(--text-muted); cursor: pointer; font-family: var(--font);
      font-weight: 500; transition: all 0.15s; white-space: nowrap;
    }
    .pill-group button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pill-group button:hover:not(.active) { border-color: var(--accent-light); color: var(--accent); }

    /* Toggle switch for issues/PRs */
    .toggle-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.3rem 0.65rem; font-size: 0.82rem;
      color: var(--text-muted); cursor: pointer; font-family: var(--font);
      font-weight: 500; transition: all 0.15s; white-space: nowrap;
    }
    .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toggle-btn:hover:not(.active) { border-color: var(--accent-light); color: var(--accent); }

    /* Cards grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
    .card-title a {
      font-size: 1.05rem; font-weight: 600;
      color: var(--accent); text-decoration: none;
    }
    .card-title a:hover { text-decoration: underline; }
    .card-version {
      font-size: 0.75rem; font-weight: 600;
      background: var(--accent-bg); color: var(--accent);
      padding: 0.15rem 0.5rem; border-radius: 999px;
      white-space: nowrap;
    }
    .card-description {
      font-size: 0.88rem; color: var(--text-muted);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-stats { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: auto; padding-top: 0.25rem; }
    .stat {
      display: flex; align-items: center; gap: 0.25rem;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .stat .value { font-weight: 700; color: var(--text); font-size: 0.95rem; }

    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .tag {
      font-size: 0.7rem; font-weight: 500;
      background: var(--blue-bg); color: var(--blue);
      padding: 0.1rem 0.45rem; border-radius: 999px;
    }

    /* Repo-specific */
    .language-dot {
      display: inline-block; width: 10px; height: 10px;
      border-radius: 50%; margin-right: 0.2rem; vertical-align: middle;
    }
    .license-badge {
      font-size: 0.7rem; font-weight: 500;
      background: var(--accent-bg); color: var(--accent);
      padding: 0.1rem 0.45rem; border-radius: 999px;
    }

    /* List view */
    .list-view { display: none; }
    .list-view table {
      width: 100%; border-collapse: collapse;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .list-view th {
      text-align: left; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-muted); padding: 0.65rem 0.75rem;
      background: var(--toolbar-bg); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .list-view td {
      padding: 0.6rem 0.75rem; font-size: 0.85rem;
      border-bottom: 1px solid var(--border); vertical-align: middle;
    }
    .list-view tr:last-child td { border-bottom: none; }
    .list-view tr:hover td { background: var(--toolbar-bg); }
    .list-view a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .list-view a:hover { text-decoration: underline; }
    .list-view .value { font-weight: 700; }
    .list-view .text-muted { color: var(--text-muted); font-size: 0.8rem; }
    .list-view .tags { margin-top: 0.15rem; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 2.5rem 1rem;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .empty-state p { font-size: 0.95rem; }

    /* Loading / Error */
    .loading, .error-msg {
      text-align: center; padding: 3rem 1rem;
    }
    .spinner {
      width: 40px; height: 40px; margin: 0 auto 1rem;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { color: #e44; }
    .error-msg .icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    /* Footer */
    footer {
      text-align: center; padding: 2rem 0;
      font-size: 0.82rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
      margin-top: 1rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .summary-card { min-width: 120px; padding: 0.75rem 1rem; }
      .summary-card .number { font-size: 1.5rem; }
      .card-grid { grid-template-columns: 1fr; }
      .filter-toolbar { gap: 0.5rem; }
      .filter-toolbar input[type="text"] { width: 100%; }
      .section-header { flex-direction: column; align-items: flex-start; }
      .list-view { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>📦 NuGet Package Dashboard</h1>
      <div class="subtitle" id="subtitle">Loading...</div>
      <div class="updated" id="updated"></div>
      <div class="summary" id="summary"></div>
    </div>
  </header>

  <main class="container">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Fetching dashboard data&hellip;</p>
    </div>
    <div id="error" class="error-msg" style="display:none;"></div>
    <div id="content" style="display:none;">

      <!-- NuGet Packages Section -->
      <section>
        <div class="section-header">
          <h2><span class="icon">📦</span> NuGet Packages</h2>
          <div class="section-meta">
            <span class="result-count" id="nuget-count"></span>
            <div class="view-toggle" id="nuget-view-toggle">
              <button data-view="cards" class="active" title="Card view">▦</button>
              <button data-view="list" title="List view">☰</button>
            </div>
          </div>
        </div>
        <div class="filter-toolbar" id="nuget-filters">
          <div class="filter-group">
            <label for="nuget-search">Search</label>
            <input type="text" id="nuget-search" placeholder="Filter by name…">
          </div>
          <div class="filter-group">
            <label for="nuget-sort">Sort</label>
            <select id="nuget-sort">
              <option value="downloads">Downloads</option>
              <option value="name-asc">Name A–Z</option>
              <option value="name-desc">Name Z–A</option>
              <option value="newest">Newest first</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Min downloads</label>
            <div class="pill-group" id="nuget-min-dl">
              <button data-min="0" class="active">All</button>
              <button data-min="1000">1K+</button>
              <button data-min="10000">10K+</button>
              <button data-min="100000">100K+</button>
            </div>
          </div>
        </div>
        <div id="nuget-grid" class="card-grid"></div>
        <div id="nuget-list" class="list-view"></div>
        <div id="nuget-empty" class="empty-state" style="display:none;">
          <span class="icon">🔍</span>
          <p>No packages match your filters</p>
        </div>
      </section>

      <!-- GitHub Repositories Section -->
      <section>
        <div class="section-header">
          <h2><span class="icon">🐙</span> GitHub Repositories</h2>
          <div class="section-meta">
            <span class="result-count" id="repo-count"></span>
            <div class="view-toggle" id="repo-view-toggle">
              <button data-view="cards" class="active" title="Card view">▦</button>
              <button data-view="list" title="List view">☰</button>
            </div>
          </div>
        </div>
        <div class="filter-toolbar" id="repo-filters">
          <div class="filter-group">
            <label for="repo-search">Search</label>
            <input type="text" id="repo-search" placeholder="Filter by name…">
          </div>
          <div class="filter-group">
            <label for="repo-sort">Sort</label>
            <select id="repo-sort">
              <option value="stars">Stars</option>
              <option value="forks">Forks</option>
              <option value="issues">Issues</option>
              <option value="prs">PRs</option>
              <option value="name-asc">Name A–Z</option>
              <option value="updated">Last updated</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="repo-language">Language</label>
            <select id="repo-language">
              <option value="">All</option>
            </select>
          </div>
          <div class="filter-group">
            <button class="toggle-btn" id="repo-has-issues" title="Show only repos with open issues">🐛 Has issues</button>
          </div>
          <div class="filter-group">
            <button class="toggle-btn" id="repo-has-prs" title="Show only repos with open PRs">🔀 Has PRs</button>
          </div>
        </div>
        <div id="repo-grid" class="card-grid"></div>
        <div id="repo-list" class="list-view"></div>
        <div id="repo-empty" class="empty-state" style="display:none;">
          <span class="icon">🔍</span>
          <p>No repositories match your filters</p>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      Powered by <strong>NuGet + GitHub Dashboard Collector</strong> &middot;
      <a href="https://github.com/elbruno/nuget-repo-dashboard" target="_blank" rel="noopener">View on GitHub</a>
    </div>
  </footer>

  <script>
    const NUGET_URL = 'data/data.nuget.json';
    const REPOS_URL = 'data/data.repositories.json';

    const LANG_COLORS = {
      'C#': '#178600', 'JavaScript': '#f1e05a', 'TypeScript': '#3178c6',
      'Python': '#3572a5', 'Java': '#b07219', 'Go': '#00add8',
      'Rust': '#dea584', 'HTML': '#e34c26', 'CSS': '#563d7c',
      'Jupyter Notebook': '#da5b0b', 'Shell': '#89e051', 'PowerShell': '#012456',
    };

    // Stored data (populated on fetch, used for filtering)
    let allPackages = [];
    let allRepos = [];

    // View mode state
    let nugetViewMode = localStorage.getItem('nuget-view') || 'cards';
    let repoViewMode = localStorage.getItem('repo-view') || 'cards';

    /* ── Helpers ── */

    function fmt(n) { return n == null ? '—' : n.toLocaleString('en-US'); }

    function fmtCompact(n) {
      if (n == null) return '—';
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
      return n.toString();
    }

    function truncate(s, max) {
      if (!s) return '';
      return s.length > max ? s.slice(0, max) + '…' : s;
    }

    function esc(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function fmtTimestamp(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', timeZoneName: 'short',
      });
    }

    /* ── NuGet Rendering ── */

    function renderNugetCard(pkg) {
      const tags = (pkg.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <a href="https://www.nuget.org/packages/${encodeURIComponent(pkg.packageId)}" target="_blank" rel="noopener">${esc(pkg.packageId)}</a>
            </div>
            <span class="card-version">v${esc(pkg.latestVersion || '')}</span>
          </div>
          <div class="card-description">${esc(truncate(pkg.description, 140))}</div>
          <div class="card-stats">
            <div class="stat">⬇️ <span class="value">${fmt(pkg.totalDownloads)}</span></div>
            <div class="stat">📅 ${fmtDate(pkg.publishedDate)}</div>
          </div>
          ${tags ? `<div class="tags">${tags}</div>` : ''}
        </div>`;
    }

    function renderNugetListTable(packages) {
      if (!packages.length) return '';
      const rows = packages.map(pkg => {
        const tags = (pkg.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('');
        return `<tr>
          <td><a href="https://www.nuget.org/packages/${encodeURIComponent(pkg.packageId)}" target="_blank" rel="noopener">${esc(pkg.packageId)}</a>
            <span class="card-version" style="margin-left:0.4rem;">v${esc(pkg.latestVersion || '')}</span>
            ${tags ? `<div class="tags">${tags}</div>` : ''}
          </td>
          <td class="text-muted">${esc(truncate(pkg.description, 80))}</td>
          <td class="value" style="text-align:right;">${fmt(pkg.totalDownloads)}</td>
          <td class="text-muted" style="white-space:nowrap;">${fmtDate(pkg.publishedDate)}</td>
        </tr>`;
      }).join('');
      return `<table>
        <thead><tr><th>Package</th><th>Description</th><th style="text-align:right;">Downloads</th><th>Published</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    /* ── Repo Rendering ── */

    function renderRepoCard(repo) {
      const color = LANG_COLORS[repo.language] || '#888';
      const topics = (repo.topics || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title">
              <a href="${esc(repo.htmlUrl || '#')}" target="_blank" rel="noopener">${esc(repo.fullName || repo.name)}</a>
            </div>
            ${repo.license ? `<span class="license-badge">${esc(repo.license)}</span>` : ''}
          </div>
          <div class="card-description">${esc(truncate(repo.description, 160))}</div>
          <div class="card-stats">
            <div class="stat">⭐ <span class="value">${fmt(repo.stars)}</span></div>
            <div class="stat">🍴 <span class="value">${fmt(repo.forks)}</span></div>
            <div class="stat">🐛 Issues <span class="value">${fmt(repo.openIssues)}</span></div>
            <div class="stat">🔀 PRs <span class="value">${fmt(repo.openPullRequests)}</span></div>
            ${repo.language ? `<div class="stat"><span class="language-dot" style="background:${color}"></span>${esc(repo.language)}</div>` : ''}
            <div class="stat">📅 ${fmtDate(repo.lastPush)}</div>
          </div>
          ${topics ? `<div class="tags">${topics}</div>` : ''}
        </div>`;
    }

    function renderRepoListTable(repos) {
      if (!repos.length) return '';
      const rows = repos.map(repo => {
        const color = LANG_COLORS[repo.language] || '#888';
        const topics = (repo.topics || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join('');
        return `<tr>
          <td>
            <a href="${esc(repo.htmlUrl || '#')}" target="_blank" rel="noopener">${esc(repo.fullName || repo.name)}</a>
            ${repo.license ? ` <span class="license-badge">${esc(repo.license)}</span>` : ''}
            ${topics ? `<div class="tags">${topics}</div>` : ''}
          </td>
          <td class="text-muted">${esc(truncate(repo.description, 80))}</td>
          <td style="white-space:nowrap;">${repo.language ? `<span class="language-dot" style="background:${color}"></span>${esc(repo.language)}` : '—'}</td>
          <td class="value" style="text-align:right;">⭐ ${fmt(repo.stars)}</td>
          <td class="value" style="text-align:right;">🍴 ${fmt(repo.forks)}</td>
          <td class="value" style="text-align:right;">🐛 ${fmt(repo.openIssues)}</td>
          <td class="value" style="text-align:right;">🔀 ${fmt(repo.openPullRequests)}</td>
          <td class="text-muted" style="white-space:nowrap;">${fmtDate(repo.lastPush)}</td>
        </tr>`;
      }).join('');
      return `<table>
        <thead><tr><th>Repository</th><th>Description</th><th>Language</th><th style="text-align:right;">Stars</th><th style="text-align:right;">Forks</th><th style="text-align:right;">Issues</th><th style="text-align:right;">PRs</th><th>Updated</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    /* ── Filter + Sort Logic ── */

    function getFilteredPackages() {
      const search = document.getElementById('nuget-search').value.toLowerCase().trim();
      const sortKey = document.getElementById('nuget-sort').value;
      const minDlBtn = document.querySelector('#nuget-min-dl button.active');
      const minDl = minDlBtn ? parseInt(minDlBtn.dataset.min, 10) : 0;

      let pkgs = allPackages.filter(p => {
        if (search && !(p.packageId || '').toLowerCase().includes(search)) return false;
        if (minDl > 0 && (p.totalDownloads || 0) < minDl) return false;
        return true;
      });

      pkgs.sort((a, b) => {
        switch (sortKey) {
          case 'downloads': return (b.totalDownloads || 0) - (a.totalDownloads || 0);
          case 'name-asc': return (a.packageId || '').localeCompare(b.packageId || '');
          case 'name-desc': return (b.packageId || '').localeCompare(a.packageId || '');
          case 'newest': return new Date(b.publishedDate || 0) - new Date(a.publishedDate || 0);
          default: return 0;
        }
      });

      return pkgs;
    }

    function getFilteredRepos() {
      const search = document.getElementById('repo-search').value.toLowerCase().trim();
      const sortKey = document.getElementById('repo-sort').value;
      const lang = document.getElementById('repo-language').value;
      const hasIssues = document.getElementById('repo-has-issues').classList.contains('active');
      const hasPrs = document.getElementById('repo-has-prs').classList.contains('active');

      let repos = allRepos.filter(r => {
        if (search && !(r.fullName || r.name || '').toLowerCase().includes(search)) return false;
        if (lang && r.language !== lang) return false;
        if (hasIssues && !(r.openIssues > 0)) return false;
        if (hasPrs && !(r.openPullRequests > 0)) return false;
        return true;
      });

      repos.sort((a, b) => {
        switch (sortKey) {
          case 'stars': return (b.stars || 0) - (a.stars || 0);
          case 'forks': return (b.forks || 0) - (a.forks || 0);
          case 'issues': return (b.openIssues || 0) - (a.openIssues || 0);
          case 'prs': return (b.openPullRequests || 0) - (a.openPullRequests || 0);
          case 'name-asc': return (a.fullName || a.name || '').localeCompare(b.fullName || b.name || '');
          case 'updated': return new Date(b.lastPush || 0) - new Date(a.lastPush || 0);
          default: return 0;
        }
      });

      return repos;
    }

    /* ── Render Functions ── */

    function renderNugetSection() {
      const pkgs = getFilteredPackages();
      const grid = document.getElementById('nuget-grid');
      const list = document.getElementById('nuget-list');
      const empty = document.getElementById('nuget-empty');
      const countEl = document.getElementById('nuget-count');

      countEl.textContent = `Showing ${pkgs.length} of ${allPackages.length} packages`;

      if (pkgs.length === 0) {
        grid.style.display = 'none';
        list.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      if (nugetViewMode === 'cards') {
        grid.innerHTML = pkgs.map(renderNugetCard).join('');
        grid.style.display = '';
        list.style.display = 'none';
      } else {
        list.innerHTML = renderNugetListTable(pkgs);
        list.style.display = 'block';
        grid.style.display = 'none';
      }
    }

    function renderRepoSection() {
      const repos = getFilteredRepos();
      const grid = document.getElementById('repo-grid');
      const list = document.getElementById('repo-list');
      const empty = document.getElementById('repo-empty');
      const countEl = document.getElementById('repo-count');

      countEl.textContent = `Showing ${repos.length} of ${allRepos.length} repositories`;

      if (repos.length === 0) {
        grid.style.display = 'none';
        list.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      if (repoViewMode === 'cards') {
        grid.innerHTML = repos.map(renderRepoCard).join('');
        grid.style.display = '';
        list.style.display = 'none';
      } else {
        list.innerHTML = renderRepoListTable(repos);
        list.style.display = 'block';
        grid.style.display = 'none';
      }
    }

    /* ── Event Wiring ── */

    function wireFilters() {
      // NuGet search (live)
      document.getElementById('nuget-search').addEventListener('input', renderNugetSection);
      document.getElementById('nuget-sort').addEventListener('change', renderNugetSection);

      // Min-downloads pills
      document.querySelectorAll('#nuget-min-dl button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#nuget-min-dl button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderNugetSection();
        });
      });

      // Repo search (live)
      document.getElementById('repo-search').addEventListener('input', renderRepoSection);
      document.getElementById('repo-sort').addEventListener('change', renderRepoSection);
      document.getElementById('repo-language').addEventListener('change', renderRepoSection);

      // Toggle buttons
      document.getElementById('repo-has-issues').addEventListener('click', function() {
        this.classList.toggle('active');
        renderRepoSection();
      });
      document.getElementById('repo-has-prs').addEventListener('click', function() {
        this.classList.toggle('active');
        renderRepoSection();
      });

      // View toggles
      function wireViewToggle(toggleId, getMode, setMode, renderFn) {
        document.querySelectorAll(`#${toggleId} button`).forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll(`#${toggleId} button`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setMode(btn.dataset.view);
            renderFn();
          });
        });
      }

      wireViewToggle('nuget-view-toggle', () => nugetViewMode, (m) => { nugetViewMode = m; localStorage.setItem('nuget-view', m); }, renderNugetSection);
      wireViewToggle('repo-view-toggle', () => repoViewMode, (m) => { repoViewMode = m; localStorage.setItem('repo-view', m); }, renderRepoSection);

      // Restore saved view modes
      setActiveViewButton('nuget-view-toggle', nugetViewMode);
      setActiveViewButton('repo-view-toggle', repoViewMode);
    }

    function setActiveViewButton(toggleId, mode) {
      document.querySelectorAll(`#${toggleId} button`).forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === mode);
      });
    }

    function populateLanguageDropdown() {
      const langs = [...new Set(allRepos.map(r => r.language).filter(Boolean))].sort();
      const sel = document.getElementById('repo-language');
      langs.forEach(lang => {
        const opt = document.createElement('option');
        opt.value = lang;
        opt.textContent = lang;
        sel.appendChild(opt);
      });
    }

    /* ── Main Load ── */

    async function loadDashboard() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const content = document.getElementById('content');

      try {
        const [nugetRes, reposRes] = await Promise.all([
          fetch(NUGET_URL), fetch(REPOS_URL),
        ]);

        if (!nugetRes.ok) throw new Error(`Failed to load NuGet data (${nugetRes.status})`);
        if (!reposRes.ok) throw new Error(`Failed to load repository data (${reposRes.status})`);

        const nugetData = await nugetRes.json();
        const reposData = await reposRes.json();

        // Store raw data for filtering
        allPackages = nugetData.packages || [];
        allRepos = reposData.repositories || [];

        // Header info
        const author = allPackages[0]?.authors || 'Dashboard';
        document.getElementById('subtitle').textContent = author;
        document.getElementById('updated').textContent =
          nugetData.generatedAt ? `Last updated: ${fmtTimestamp(nugetData.generatedAt)}` : '';

        // Summary cards
        const totalDownloads = allPackages.reduce((s, p) => s + (p.totalDownloads || 0), 0);
        document.getElementById('summary').innerHTML = `
          <div class="summary-card"><div class="number">${fmt(allPackages.length)}</div><div class="label">Packages</div></div>
          <div class="summary-card"><div class="number">${fmt(allRepos.length)}</div><div class="label">Repositories</div></div>
          <div class="summary-card"><div class="number">${fmt(totalDownloads)}</div><div class="label">Total Downloads</div></div>
        `;

        // Populate dynamic filter options
        populateLanguageDropdown();

        // Wire up filter events
        wireFilters();

        // Initial render
        renderNugetSection();
        renderRepoSection();

        loading.style.display = 'none';
        content.style.display = 'block';
      } catch (err) {
        loading.style.display = 'none';
        errorEl.innerHTML = `<span class="icon">⚠️</span><p><strong>Could not load dashboard data.</strong></p><p>${err.message}</p>`;
        errorEl.style.display = 'block';
        console.error('Dashboard load error:', err);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
